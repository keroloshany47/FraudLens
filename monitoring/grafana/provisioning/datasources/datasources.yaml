apiVersion: 1

datasources:

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL-OLTP
    type: postgres
    access: proxy
    url: postgres:5432
    database: fraudlens
    user: fraudlens
    secureJsonData:
      password: fraudlens_secret
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    editable: false

  - name: PostgreSQL-DW
    type: postgres
    access: proxy
    url: postgres:5432
    database: fraudlens
    user: fraudlens
    secureJsonData:
      password: fraudlens_secret
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    editable: false
