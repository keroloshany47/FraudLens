global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL metrics (query latency, connections, table stats)
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Spark master metrics (active jobs, executor count, worker health)
  - job_name: spark
    metrics_path: /metrics/master/prometheus
    static_configs:
      - targets: ['spark-master:8080']

  # FraudLens custom exporter
  # Exposes: fraudlens_dlq_depth, fraudlens_events_per_second
  # This is what feeds the DLQ panel and pipeline throughput panel in Grafana.
  - job_name: fraudlens
    scrape_interval: 15s
    static_configs:
      - targets: ['fraudlens-exporter:8000']
