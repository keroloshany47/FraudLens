fraudlens:
  target: dev
  outputs:

    # local Docker environment
    dev:
      type: postgres
      host: postgres
      port: 5432
      dbname: fraudlens
      user: fraudlens
      password: fraudlens_secret
      schema: public
      threads: 4

    # GitHub Actions CI environment
    ci:
      type: postgres
      host: localhost
      port: 5432
      dbname: fraudlens
      user: fraudlens
      password: fraudlens_secret
      schema: public
      threads: 2
