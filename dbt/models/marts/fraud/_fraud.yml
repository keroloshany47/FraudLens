version: 2

models:

  - name: mart_fraud_summary
    description: >
      Daily fraud metrics by merchant category and customer state.
      Primary model for the Grafana business dashboard.
      Rows with NULL merchant_category come from stream-path transactions
      where FK resolution has not been performed.
    columns:
      - name: txn_date
        data_tests: [not_null]
      - name: total_transactions
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: fraud_rate_pct
        description: Percentage of transactions that are fraud (0-100)
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

  - name: mart_customer_360
    description: >
      Per-customer risk profile across all their transactions.
      Only covers customers with resolved customer_id (batch path).
    columns:
      - name: total_transactions
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: risk_tier
        data_tests:
          - not_null
          - accepted_values:
              values: ['HIGH', 'MEDIUM', 'LOW']
