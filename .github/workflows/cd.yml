name: CD — Publish dbt Docs

on:
  push:
    branches: [main]
    paths:
      - "dbt/**"

permissions:
  contents: write

jobs:
  publish-docs:
    name: dbt docs → GitHub Pages
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15.6
        env:
          POSTGRES_USER:     fraudlens
          POSTGRES_PASSWORD: fraudlens_secret
          POSTGRES_DB:       fraudlens
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install dbt-postgres==1.8.0 dbt-utils==1.2.0
      - name: Apply OLTP schema
        run: |
          PGPASSWORD=fraudlens_secret psql \
            -h localhost -U fraudlens -d fraudlens \
            -f infra/docker/postgres/init/01_schema.sql
      - name: dbt run staging
        working-directory: ./dbt
        run: dbt run --profiles-dir . --target ci --select staging
      - name: dbt docs generate
        working-directory: ./dbt
        run: dbt docs generate --profiles-dir . --target ci
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:   ${{ secrets.GITHUB_TOKEN }}
          publish_dir:    ./dbt/target
          commit_message: "docs: auto-publish dbt catalog [${{ github.sha }}]"
          force_orphan:   true
