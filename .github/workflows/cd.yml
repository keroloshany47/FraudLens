name: CD 

on:
  push:
    branches: [main]
    
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-docs:
    name: dbt docs → GitHub Pages
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15.6
        env:
          POSTGRES_USER: fraudlens
          POSTGRES_PASSWORD: fraudlens_secret
          POSTGRES_DB: fraudlens
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U fraudlens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      
      - name: Install dbt
        run: |
          pip install dbt-core==1.8.0
          pip install dbt-postgres==1.8.0

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply OLTP schema
        run: |
          PGPASSWORD=fraudlens_secret psql \
            -h localhost \
            -U fraudlens \
            -d fraudlens \
            -f infra/docker/postgres/init/01_schema.sql

      - name: dbt deps
        working-directory: ./dbt
        run: dbt deps --profiles-dir . --target ci

      - name: dbt run (all models)
        working-directory: ./dbt
        run: dbt run --profiles-dir . --target ci

      - name: dbt docs generate
        working-directory: ./dbt
        run: dbt docs generate --profiles-dir . --target ci

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dbt/target
          publish_branch: gh-pages
          commit_message: "docs: auto-publish dbt catalog [${{ github.sha }}]"
          force_orphan: true
