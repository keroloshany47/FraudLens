name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. dbt parse + run + test ───────────────────────────────────────────────
  dbt-check:
    name: dbt — parse & test
    runs-on: ubuntu-latest


    services:
      postgres:
        image: postgres:15.6
        env:
          POSTGRES_USER: fraudlens
          POSTGRES_PASSWORD: fraudlens_secret
          POSTGRES_DB: fraudlens
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

