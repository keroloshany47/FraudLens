      - name: Install dbt-postgres
        run: pip install dbt-postgres==1.8.0


      - name: Apply OLTP schema
        run: |
          PGPASSWORD=fraudlens_secret psql \
            -h localhost \
            -U fraudlens \
            -d fraudlens \
            -f infra/docker/postgres/init/01_schema.sql

      # Install dbt packages declared in packages.yml
      - name: dbt deps
        working-directory: ./dbt
        run: dbt deps --profiles-dir . --target ci

      - name: dbt parse
        working-directory: ./dbt
        run: dbt parse --profiles-dir . --target ci

      # Run all layers so tests have relations available
      - name: dbt run
        working-directory: ./dbt
        run: dbt run --profiles-dir . --target ci

      - name: dbt test
        working-directory: ./dbt
        run: dbt test --profiles-dir . --target ci

