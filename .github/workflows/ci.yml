name: CI

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # dbt check (parse + run + test)
  # ─────────────────────────────────────────────
  dbt-check:
    name: dbt — parse & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15.6
        env:
          POSTGRES_USER: fraudlens
          POSTGRES_PASSWORD: fraudlens_secret
          POSTGRES_DB: fraudlens
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U fraudlens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install dbt
      - name: Install dbt
        run: |
          pip install dbt-core==1.8.0
          pip install dbt-postgres==1.8.0

      # Install psql client
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      # Create OLTP schema
      - name: Apply OLTP schema
        run: |
          PGPASSWORD=fraudlens_secret psql \
            -h localhost \
            -U fraudlens \
            -d fraudlens \
            -f infra/docker/postgres/init/01_schema.sql

      # Install dbt packages (dbt_utils etc.)
      - name: dbt deps
        working-directory: ./dbt
        run: dbt deps --profiles-dir . --target ci

      # Parse project
      - name: dbt parse
        working-directory: ./dbt
        run: dbt parse --profiles-dir . --target ci

      # Build models
      - name: dbt run
        working-directory: ./dbt
        run: dbt run --profiles-dir . --target ci

      # Execute tests
      - name: dbt test
        working-directory: ./dbt
        run: dbt test --profiles-dir . --target ci

  # ─────────────────────────────────────────────
  # Spark unit tests
  # ─────────────────────────────────────────────
  spark-check:
    name: Spark — unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Spark dependencies
        run: |
          pip install pytest==8.2.0 pyspark==3.5.1

      - name: Run Spark tests
        run: pytest spark/tests/ -v --tb=short
